<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1400" width="2400" height="1400" font-family="Inter, -apple-system, sans-serif">
<defs>
<style>
 .title { font-size: 24px; font-weight: 700; fill: #1A1A2E; }
 .subtitle { font-size: 14px; font-weight: 400; fill: #6B7280; }
 .entity-name { font-size: 14px; font-weight: 700; fill: #FFFFFF; }
 .pk { font-size: 11px; font-weight: 600; fill: #374151; }
 .field { font-size: 11px; font-weight: 400; fill: #4B5563; }
 .fk { font-size: 11px; font-weight: 400; fill: #2563EB; }
 .type { font-size: 10px; font-weight: 400; fill: #9CA3AF; }
 .section-label { font-size: 10px; font-weight: 700; fill: #6B7280; letter-spacing: 0.05em; text-transform: uppercase; }
 .rel-label { font-size: 10px; font-weight: 500; fill: #6B7280; }
 .process-title { font-size: 16px; font-weight: 700; fill: #1F2937; }
 .step-text { font-size: 12px; font-weight: 500; fill: #FFFFFF; }
 .step-desc { font-size: 10px; font-weight: 400; fill: #6B7280; }
 .decision-text { font-size: 11px; font-weight: 600; fill: #FFFFFF; }
 .swim-label { font-size: 12px; font-weight: 700; fill: #374151; }
 .status-text { font-size: 10px; font-weight: 600; }
 .note-text { font-size: 10px; font-weight: 400; fill: #6B7280; font-style: italic; }
</style>
<marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 3.5 L0 7 Z" fill="#9CA3AF"/></marker>
<marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 3.5 L0 7 Z" fill="#3B82F6"/></marker>
<marker id="diamond" viewBox="0 0 12 8" refX="6" refY="4" markerWidth="12" markerHeight="8" orient="auto"><path d="M0 4 L6 0 L12 4 L6 8 Z" fill="#9CA3AF"/></marker>
<marker id="diamond-filled" viewBox="0 0 12 8" refX="6" refY="4" markerWidth="12" markerHeight="8" orient="auto"><path d="M0 4 L6 0 L12 4 L6 8 Z" fill="#3B82F6"/></marker>
</defs>
<rect width="2400" height="1400" fill="#FAFBFC"/>

<!-- Title -->
<text x="1200" y="50" text-anchor="middle" class="title">Bearing — Pathfinder &amp; Benchmarking Schema</text>
<text x="1200" y="75" text-anchor="middle" class="subtitle">Behavioral confidence, coverage analysis, and peer benchmarks</text>

<!-- ==================== PATHFINDER_CONFIDENCE ==================== -->
<rect x="102" y="122" width="460" height="580" rx="8" fill="#D1D5DB" opacity="0.4"/>
<rect x="100" y="120" width="460" height="580" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
<rect x="100" y="120" width="460" height="36" rx="8" fill="#3B82F6"/>
<rect x="100" y="140" width="460" height="16" fill="#3B82F6"/>
<text x="330" y="144" text-anchor="middle" class="entity-name">PATHFINDER_CONFIDENCE</text>

<text x="120" y="178" class="pk">&#128273; id</text><text x="480" y="178" text-anchor="end" class="type">uuid</text>
<rect x="120" y="186" width="420" height="1" fill="#F3F4F6"/>
<text x="120" y="200" class="fk">&#128279; org_id</text><text x="480" y="200" text-anchor="end" class="type">uuid</text>
<rect x="120" y="208" width="420" height="1" fill="#F3F4F6"/>
<text x="120" y="222" class="fk">&#128279; instance_connection_id</text><text x="480" y="222" text-anchor="end" class="type">uuid</text>
<rect x="120" y="230" width="420" height="1" fill="#F3F4F6"/>
<text x="120" y="244" class="field">ci_sys_id</text><text x="480" y="244" text-anchor="end" class="type">text</text>
<rect x="120" y="252" width="420" height="1" fill="#F3F4F6"/>
<text x="120" y="266" class="field">ci_class</text><text x="480" y="266" text-anchor="end" class="type">text</text>
<rect x="120" y="274" width="420" height="1" fill="#F3F4F6"/>
<text x="120" y="288" class="field">confidence_score</text><text x="480" y="288" text-anchor="end" class="type">integer 0-100</text>
<rect x="120" y="296" width="420" height="1" fill="#F3F4F6"/>
<text x="120" y="310" class="field">traffic_state</text><text x="480" y="310" text-anchor="end" class="type">enum: active|idle|deprecated|unknown</text>
<rect x="120" y="318" width="420" height="1" fill="#F3F4F6"/>
<text x="120" y="332" class="field">last_observation</text><text x="480" y="332" text-anchor="end" class="type">timestamptz</text>
<rect x="120" y="340" width="420" height="1" fill="#F3F4F6"/>
<text x="120" y="354" class="field">observation_count</text><text x="480" y="354" text-anchor="end" class="type">integer</text>
<rect x="120" y="362" width="420" height="1" fill="#F3F4F6"/>
<text x="120" y="376" class="field">behavioral_classification</text><text x="480" y="376" text-anchor="end" class="type">jsonb</text>
<rect x="120" y="384" width="420" height="1" fill="#F3F4F6"/>
<text x="120" y="398" class="field">relationship_confirmations</text><text x="480" y="398" text-anchor="end" class="type">jsonb</text>
<rect x="120" y="406" width="420" height="1" fill="#F3F4F6"/>
<text x="120" y="420" class="field">received_at</text><text x="480" y="420" text-anchor="end" class="type">timestamptz</text>

<!-- Unique constraint badge -->
<rect x="120" y="445" width="420" height="30" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
<text x="330" y="465" text-anchor="middle" class="section-label" fill="#3B82F6">UNIQUE ( org_id, instance_connection_id, ci_sys_id )</text>

<!-- Traffic state examples -->
<text x="120" y="510" class="section-label">TRAFFIC STATES</text>
<rect x="120" y="520" width="70" height="20" rx="10" fill="#10B981" opacity="0.15"/>
<text x="155" y="534" text-anchor="middle" class="status-text" fill="#10B981">active</text>
<rect x="200" y="520" width="50" height="20" rx="10" fill="#F59E0B" opacity="0.15"/>
<text x="225" y="534" text-anchor="middle" class="status-text" fill="#F59E0B">idle</text>
<rect x="260" y="520" width="80" height="20" rx="10" fill="#EF4444" opacity="0.15"/>
<text x="300" y="534" text-anchor="middle" class="status-text" fill="#EF4444">deprecated</text>
<rect x="350" y="520" width="70" height="20" rx="10" fill="#9CA3AF" opacity="0.15"/>
<text x="385" y="534" text-anchor="middle" class="status-text" fill="#9CA3AF">unknown</text>

<!-- Confidence ranges -->
<text x="120" y="570" class="section-label">CONFIDENCE RANGES</text>
<rect x="120" y="580" width="100" height="18" rx="4" fill="#10B981"/>
<text x="170" y="593" text-anchor="middle" class="step-text" style="font-size:9px">90-100 High</text>
<rect x="230" y="580" width="100" height="18" rx="4" fill="#F59E0B"/>
<text x="280" y="593" text-anchor="middle" class="step-text" style="font-size:9px">60-89 Medium</text>
<rect x="340" y="580" width="100" height="18" rx="4" fill="#EF4444"/>
<text x="390" y="593" text-anchor="middle" class="step-text" style="font-size:9px">0-59 Low</text>

<!-- ==================== BENCHMARK_DATA ==================== -->
<rect x="662" y="122" width="420" height="420" rx="8" fill="#D1D5DB" opacity="0.4"/>
<rect x="660" y="120" width="420" height="420" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
<rect x="660" y="120" width="420" height="36" rx="8" fill="#EF4444"/>
<rect x="660" y="140" width="420" height="16" fill="#EF4444"/>
<text x="870" y="144" text-anchor="middle" class="entity-name">BENCHMARK_DATA</text>

<text x="680" y="178" class="pk">&#128273; id</text><text x="1000" y="178" text-anchor="end" class="type">uuid</text>
<rect x="680" y="186" width="380" height="1" fill="#F3F4F6"/>
<text x="680" y="200" class="fk">&#128279; assessment_id</text><text x="1000" y="200" text-anchor="end" class="type">uuid</text>
<rect x="680" y="208" width="380" height="1" fill="#F3F4F6"/>
<text x="680" y="222" class="field">industry_vertical</text><text x="1000" y="222" text-anchor="end" class="type">text</text>
<rect x="680" y="230" width="380" height="1" fill="#F3F4F6"/>
<text x="680" y="244" class="field">company_size_tier</text><text x="1000" y="244" text-anchor="end" class="type">enum: smb|midmarket|enterprise</text>
<rect x="680" y="252" width="380" height="1" fill="#F3F4F6"/>
<text x="680" y="266" class="field">servicenow_version</text><text x="1000" y="266" text-anchor="end" class="type">text</text>
<rect x="680" y="274" width="380" height="1" fill="#F3F4F6"/>
<text x="680" y="288" class="field">module</text><text x="1000" y="288" text-anchor="end" class="type">text</text>
<rect x="680" y="296" width="380" height="1" fill="#F3F4F6"/>
<text x="680" y="310" class="field">health_score</text><text x="1000" y="310" text-anchor="end" class="type">integer</text>
<rect x="680" y="318" width="380" height="1" fill="#F3F4F6"/>
<text x="680" y="332" class="field">finding_counts</text><text x="1000" y="332" text-anchor="end" class="type">jsonb</text>
<rect x="680" y="340" width="380" height="1" fill="#F3F4F6"/>
<text x="680" y="354" class="field">anonymized</text><text x="1000" y="354" text-anchor="end" class="type">boolean, default true</text>

<!-- Size tier badges -->
<text x="680" y="390" class="section-label">COMPANY SIZE TIERS</text>
<rect x="680" y="400" width="50" height="20" rx="10" fill="#6366F1" opacity="0.15"/>
<text x="705" y="414" text-anchor="middle" class="status-text" fill="#6366F1">SMB</text>
<rect x="740" y="400" width="80" height="20" rx="10" fill="#F59E0B" opacity="0.15"/>
<text x="780" y="414" text-anchor="middle" class="status-text" fill="#F59E0B">Midmarket</text>
<rect x="830" y="400" width="80" height="20" rx="10" fill="#EF4444" opacity="0.15"/>
<text x="870" y="414" text-anchor="middle" class="status-text" fill="#EF4444">Enterprise</text>

<!-- ==================== GENERATED_SOW ==================== -->
<rect x="1182" y="122" width="420" height="460" rx="8" fill="#D1D5DB" opacity="0.4"/>
<rect x="1180" y="120" width="420" height="460" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
<rect x="1180" y="120" width="420" height="36" rx="8" fill="#8B5CF6"/>
<rect x="1180" y="140" width="420" height="16" fill="#8B5CF6"/>
<text x="1390" y="144" text-anchor="middle" class="entity-name">GENERATED_SOW</text>

<text x="1200" y="178" class="pk">&#128273; id</text><text x="1520" y="178" text-anchor="end" class="type">uuid</text>
<rect x="1200" y="186" width="380" height="1" fill="#F3F4F6"/>
<text x="1200" y="200" class="fk">&#128279; org_id</text><text x="1520" y="200" text-anchor="end" class="type">uuid</text>
<rect x="1200" y="208" width="380" height="1" fill="#F3F4F6"/>
<text x="1200" y="222" class="fk">&#128279; assessment_id</text><text x="1520" y="222" text-anchor="end" class="type">uuid</text>
<rect x="1200" y="230" width="380" height="1" fill="#F3F4F6"/>
<text x="1200" y="244" class="field">status</text><text x="1520" y="244" text-anchor="end" class="type">enum: draft|sent|under_review|accepted|declined</text>
<rect x="1200" y="252" width="380" height="1" fill="#F3F4F6"/>
<text x="1200" y="266" class="field">engagement_type</text><text x="1520" y="266" text-anchor="end" class="type">enum: time_and_materials|fixed_fee|blended</text>
<rect x="1200" y="274" width="380" height="1" fill="#F3F4F6"/>
<text x="1200" y="288" class="field">total_hours_low</text><text x="1520" y="288" text-anchor="end" class="type">integer</text>
<rect x="1200" y="296" width="380" height="1" fill="#F3F4F6"/>
<text x="1200" y="310" class="field">total_hours_high</text><text x="1520" y="310" text-anchor="end" class="type">integer</text>
<rect x="1200" y="318" width="380" height="1" fill="#F3F4F6"/>
<text x="1200" y="332" class="field">total_revenue_low</text><text x="1520" y="332" text-anchor="end" class="type">decimal</text>
<rect x="1200" y="340" width="380" height="1" fill="#F3F4F6"/>
<text x="1200" y="354" class="field">total_revenue_high</text><text x="1520" y="354" text-anchor="end" class="type">decimal</text>
<rect x="1200" y="362" width="380" height="1" fill="#F3F4F6"/>
<text x="1200" y="376" class="field">included_finding_ids</text><text x="1520" y="376" text-anchor="end" class="type">jsonb</text>
<rect x="1200" y="384" width="380" height="1" fill="#F3F4F6"/>
<text x="1200" y="398" class="field">document_url</text><text x="1520" y="398" text-anchor="end" class="type">text</text>

<!-- SOW Status pipeline -->
<text x="1200" y="430" class="section-label">STATUS PIPELINE</text>
<rect x="1200" y="440" width="55" height="20" rx="10" fill="#9CA3AF" opacity="0.15"/>
<text x="1227" y="454" text-anchor="middle" class="status-text" fill="#9CA3AF">Draft</text>
<text x="1262" y="454" class="rel-label">&#8594;</text>
<rect x="1275" y="440" width="45" height="20" rx="10" fill="#3B82F6" opacity="0.15"/>
<text x="1297" y="454" text-anchor="middle" class="status-text" fill="#3B82F6">Sent</text>
<text x="1327" y="454" class="rel-label">&#8594;</text>
<rect x="1340" y="440" width="75" height="20" rx="10" fill="#F59E0B" opacity="0.15"/>
<text x="1377" y="454" text-anchor="middle" class="status-text" fill="#F59E0B">Review</text>
<text x="1422" y="454" class="rel-label">&#8594;</text>
<rect x="1435" y="440" width="68" height="20" rx="10" fill="#10B981" opacity="0.15"/>
<text x="1469" y="454" text-anchor="middle" class="status-text" fill="#10B981">Accepted</text>
<rect x="1435" y="466" width="68" height="20" rx="10" fill="#EF4444" opacity="0.15"/>
<text x="1469" y="480" text-anchor="middle" class="status-text" fill="#EF4444">Declined</text>

<!-- ==================== Relationship Lines ==================== -->
<!-- PATHFINDER feeds into ASSESSMENT (implied) -->
<path d="M 560 300 Q 610 300 660 260" stroke="#3B82F6" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
<text x="610" y="270" text-anchor="middle" class="rel-label">enriches assessment</text>

<!-- ASSESSMENT feeds BENCHMARK_DATA -->
<!-- (implied via assessment_id FK on BENCHMARK_DATA) -->

<!-- ASSESSMENT feeds GENERATED_SOW -->
<!-- (implied via assessment_id FK on GENERATED_SOW) -->

<!-- Cross-domain relationship visualization -->
<rect x="100" y="780" width="1500" height="200" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
<text x="850" y="815" text-anchor="middle" class="process-title">Cross-Domain Data Flow</text>

<!-- Flow boxes -->
<rect x="140" y="840" width="180" height="50" rx="8" fill="#6366F1"/>
<text x="230" y="870" text-anchor="middle" class="step-text">Assessment</text>

<line x1="320" y1="865" x2="380" y2="865" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<rect x="380" y="840" width="180" height="50" rx="8" fill="#3B82F6"/>
<text x="470" y="870" text-anchor="middle" class="step-text">Pathfinder Feed</text>

<line x1="560" y1="865" x2="620" y2="865" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<rect x="620" y="840" width="180" height="50" rx="8" fill="#F59E0B"/>
<text x="710" y="870" text-anchor="middle" class="step-text">Scoring + Fusion</text>

<line x1="800" y1="865" x2="860" y2="865" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<rect x="860" y="840" width="180" height="50" rx="8" fill="#8B5CF6"/>
<text x="950" y="870" text-anchor="middle" class="step-text">SOW Generation</text>

<line x1="1040" y1="865" x2="1100" y2="865" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<rect x="1100" y="840" width="180" height="50" rx="8" fill="#EF4444"/>
<text x="1190" y="870" text-anchor="middle" class="step-text">Benchmarks</text>

<line x1="1280" y1="865" x2="1340" y2="865" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<rect x="1340" y="840" width="180" height="50" rx="8" fill="#EC4899"/>
<text x="1430" y="870" text-anchor="middle" class="step-text">Compass Sync</text>

<text x="850" y="930" text-anchor="middle" class="step-desc">Assessment findings + Pathfinder confidence = Fusion scoring = SOW = Benchmarks = Calibration loop</text>

<!-- Legend -->
<rect x="100" y="1050" width="800" height="60" rx="8" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1"/>
<text x="120" y="1075" class="section-label">LEGEND</text>
<rect x="200" y="1066" width="14" height="14" rx="3" fill="#3B82F6"/>
<text x="220" y="1078" class="rel-label">Pathfinder</text>
<rect x="300" y="1066" width="14" height="14" rx="3" fill="#EF4444"/>
<text x="320" y="1078" class="rel-label">Benchmarking</text>
<rect x="420" y="1066" width="14" height="14" rx="3" fill="#8B5CF6"/>
<text x="440" y="1078" class="rel-label">Reporting/SOW</text>
<text x="120" y="1098" class="note-text">PATHFINDER_CONFIDENCE has a composite unique constraint on (org_id, instance_connection_id, ci_sys_id) for upsert semantics.</text>
</svg>