  <text x="370" y="119" text-anchor="middle" class="heading" fill="#1C1917" font-size="10">2</text>
  <text x="395" y="119" class="label" fill="#39FF14" font-size="11">DISCOVER</text>

  <line x1="470" y1="115" x2="535" y2="115" stroke="#39FF14" stroke-width="1.5" marker-end="url(#flowArrow)"/>

  <circle cx="585" cy="115" r="12" fill="#39FF14" opacity="0.6"/>
