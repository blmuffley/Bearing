      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&amp;family=DM+Sans:wght@400;500;600&amp;family=Space+Mono&amp;display=swap');
      .heading { font-family: 'Syne', sans-serif; font-weight: 700; }
      .body { font-family: 'DM Sans', sans-serif; font-weight: 500; }
      .mono { font-family: 'Space Mono', monospace; }
      .label { font-family: 'DM Sans', sans-serif; font-weight: 600; }
    </style>
    <marker id="flowArrow" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#39FF14"/>
    </marker>
    <marker id="dataArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A8A29E"/>
    </marker>
    <filter id="glowBearing">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bearingGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#39FF14;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#39FF14;stop-opacity:0.05"/>
    </linearGradient>
