  <circle cx="160" cy="115" r="12" fill="#39FF14"/>
  <text x="160" y="119" text-anchor="middle" class="heading" fill="#1C1917" font-size="10">1</text>
  <text x="185" y="119" class="label" fill="#39FF14" font-size="11">ASSESS</text>

  <line x1="245" y1="115" x2="310" y2="115" stroke="#39FF14" stroke-width="1.5" marker-end="url(#flowArrow)"/>

