<rect x="120" y="274" width="300" height="1" fill="#F3F4F6"/>
<text x="120" y="288" class="field">created_at</text><text x="360" y="288" text-anchor="end" class="type">timestamptz</text>

<!-- ==================== USER ==================== -->
<rect x="102" y="442" width="340" height="260" rx="8" fill="#D1D5DB" opacity="0.4"/>
