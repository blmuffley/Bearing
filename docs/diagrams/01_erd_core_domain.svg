<rect x="100" y="140" width="340" height="16" fill="#EC4899"/>
<text x="270" y="144" text-anchor="middle" class="entity-name">ORGANIZATION</text>
<!-- Fields -->
<text x="120" y="178" class="pk">&#128273; id</text><text x="360" y="178" text-anchor="end" class="type">uuid</text>
<rect x="120" y="186" width="300" height="1" fill="#F3F4F6"/>
<text x="120" y="200" class="field">name</text><text x="360" y="200" text-anchor="end" class="type">text</text>
<rect x="120" y="208" width="300" height="1" fill="#F3F4F6"/>
