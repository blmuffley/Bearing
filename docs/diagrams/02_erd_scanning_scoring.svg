<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1400" width="2400" height="1400" font-family="Inter, -apple-system, sans-serif">
<defs>
<style>
 .title { font-size: 24px; font-weight: 700; fill: #1A1A2E; }
 .subtitle { font-size: 14px; font-weight: 400; fill: #6B7280; }
 .entity-name { font-size: 14px; font-weight: 700; fill: #FFFFFF; }
 .pk { font-size: 11px; font-weight: 600; fill: #374151; }
 .field { font-size: 11px; font-weight: 400; fill: #4B5563; }
 .fk { font-size: 11px; font-weight: 400; fill: #2563EB; }
 .type { font-size: 10px; font-weight: 400; fill: #9CA3AF; }
 .section-label { font-size: 10px; font-weight: 700; fill: #6B7280; letter-spacing: 0.05em; text-transform: uppercase; }
 .rel-label { font-size: 10px; font-weight: 500; fill: #6B7280; }
 .process-title { font-size: 16px; font-weight: 700; fill: #1F2937; }
 .step-text { font-size: 12px; font-weight: 500; fill: #FFFFFF; }
 .step-desc { font-size: 10px; font-weight: 400; fill: #6B7280; }
 .decision-text { font-size: 11px; font-weight: 600; fill: #FFFFFF; }
 .swim-label { font-size: 12px; font-weight: 700; fill: #374151; }
 .status-text { font-size: 10px; font-weight: 600; }
 .note-text { font-size: 10px; font-weight: 400; fill: #6B7280; font-style: italic; }
</style>
<marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 3.5 L0 7 Z" fill="#9CA3AF"/></marker>
<marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 3.5 L0 7 Z" fill="#3B82F6"/></marker>
<marker id="diamond" viewBox="0 0 12 8" refX="6" refY="4" markerWidth="12" markerHeight="8" orient="auto"><path d="M0 4 L6 0 L12 4 L6 8 Z" fill="#9CA3AF"/></marker>
<marker id="diamond-filled" viewBox="0 0 12 8" refX="6" refY="4" markerWidth="12" markerHeight="8" orient="auto"><path d="M0 4 L6 0 L12 4 L6 8 Z" fill="#3B82F6"/></marker>
</defs>
<rect width="2400" height="1400" fill="#FAFBFC"/>

<!-- Title -->
<text x="1200" y="50" text-anchor="middle" class="title">Bearing — Scanning &amp; Scoring Schema</text>
<text x="1200" y="75" text-anchor="middle" class="subtitle">Scan rules, remediation patterns, and scoring engine</text>

<!-- ==================== SCAN_RULE ==================== -->
<rect x="102" y="122" width="420" height="500" rx="8" fill="#D1D5DB" opacity="0.4"/>
<rect x="100" y="120" width="420" height="500" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
<rect x="100" y="120" width="420" height="36" rx="8" fill="#10B981"/>
<rect x="100" y="140" width="420" height="16" fill="#10B981"/>
<text x="310" y="144" text-anchor="middle" class="entity-name">SCAN_RULE</text>
<text x="120" y="178" class="pk">&#128273; id</text><text x="440" y="178" text-anchor="end" class="type">uuid</text>
<rect x="120" y="186" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="200" class="field">module</text><text x="440" y="200" text-anchor="end" class="type">text</text>
<rect x="120" y="208" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="222" class="field">category</text><text x="440" y="222" text-anchor="end" class="type">text</text>
<rect x="120" y="230" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="244" class="field">rule_key</text><text x="440" y="244" text-anchor="end" class="type">text, unique</text>
<rect x="120" y="252" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="266" class="field">display_name</text><text x="440" y="266" text-anchor="end" class="type">text</text>
<rect x="120" y="274" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="288" class="field">severity</text><text x="440" y="288" text-anchor="end" class="type">enum</text>
<rect x="120" y="296" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="310" class="field">risk_score</text><text x="440" y="310" text-anchor="end" class="type">integer</text>
<rect x="120" y="318" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="332" class="fk">&#128279; remediation_pattern_key</text><text x="440" y="332" text-anchor="end" class="type">text</text>
<rect x="120" y="340" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="354" class="field">query_config</text><text x="440" y="354" text-anchor="end" class="type">jsonb</text>
<rect x="120" y="362" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="376" class="field">evaluation_logic</text><text x="440" y="376" text-anchor="end" class="type">text</text>
<rect x="120" y="384" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="398" class="field">threshold_config</text><text x="440" y="398" text-anchor="end" class="type">jsonb</text>
<rect x="120" y="406" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="420" class="field">enabled</text><text x="440" y="420" text-anchor="end" class="type">boolean</text>

<!-- 23 rules badge -->
<rect x="370" y="440" width="60" height="22" rx="11" fill="#10B981" opacity="0.15"/>
<text x="400" y="455" text-anchor="middle" class="status-text" fill="#10B981">23 rules</text>

<!-- ==================== REMEDIATION_PATTERN ==================== -->
<rect x="622" y="122" width="420" height="500" rx="8" fill="#D1D5DB" opacity="0.4"/>
<rect x="620" y="120" width="420" height="500" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
<rect x="620" y="120" width="420" height="36" rx="8" fill="#8B5CF6"/>
<rect x="620" y="140" width="420" height="16" fill="#8B5CF6"/>
<text x="830" y="144" text-anchor="middle" class="entity-name">REMEDIATION_PATTERN</text>
<text x="640" y="178" class="pk">&#128273; id</text><text x="960" y="178" text-anchor="end" class="type">uuid</text>
<rect x="640" y="186" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="200" class="field">pattern_key</text><text x="960" y="200" text-anchor="end" class="type">text, unique</text>
<rect x="640" y="208" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="222" class="field">display_name</text><text x="960" y="222" text-anchor="end" class="type">text</text>
<rect x="640" y="230" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="244" class="field">effort_hours_low</text><text x="960" y="244" text-anchor="end" class="type">integer</text>
<rect x="640" y="252" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="266" class="field">effort_hours_high</text><text x="960" y="266" text-anchor="end" class="type">integer</text>
<rect x="640" y="274" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="288" class="field">effort_tshirt</text><text x="960" y="288" text-anchor="end" class="type">enum</text>
<rect x="640" y="296" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="310" class="field">required_roles</text><text x="960" y="310" text-anchor="end" class="type">jsonb</text>
<rect x="640" y="318" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="332" class="field">sow_scope_template</text><text x="960" y="332" text-anchor="end" class="type">text</text>
<rect x="640" y="340" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="354" class="field">sow_assumptions</text><text x="960" y="354" text-anchor="end" class="type">text</text>
<rect x="640" y="362" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="376" class="field">sow_deliverables</text><text x="960" y="376" text-anchor="end" class="type">jsonb</text>
<rect x="640" y="384" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="398" class="field">calibration_factor</text><text x="960" y="398" text-anchor="end" class="type">decimal</text>
<rect x="640" y="406" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="420" class="field">calibration_sample_size</text><text x="960" y="420" text-anchor="end" class="type">integer</text>

<!-- 12 patterns badge -->
<rect x="880" y="440" width="80" height="22" rx="11" fill="#8B5CF6" opacity="0.15"/>
<text x="920" y="455" text-anchor="middle" class="status-text" fill="#8B5CF6">12 patterns</text>

<!-- Relationship: SCAN_RULE N→1 REMEDIATION_PATTERN -->
<line x1="520" y1="332" x2="620" y2="200" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
<text x="570" y="255" text-anchor="middle" class="rel-label">N : 1</text>
<text x="570" y="270" text-anchor="middle" class="note-text">via pattern_key</text>

<!-- ==================== FINDING (reference) ==================== -->
<rect x="102" y="702" width="420" height="180" rx="8" fill="#D1D5DB" opacity="0.4"/>
<rect x="100" y="700" width="420" height="180" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
<rect x="100" y="700" width="420" height="36" rx="8" fill="#10B981"/>
<rect x="100" y="720" width="420" height="16" fill="#10B981"/>
<text x="310" y="724" text-anchor="middle" class="entity-name">FINDING (reference)</text>
<text x="120" y="758" class="pk">&#128273; id</text><text x="440" y="758" text-anchor="end" class="type">uuid</text>
<rect x="120" y="766" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="780" class="field">severity_score, risk_score, effort_*</text><text x="440" y="780" text-anchor="end" class="type">computed</text>
<rect x="120" y="788" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="802" class="field">composite_score</text><text x="440" y="802" text-anchor="end" class="type">decimal (scored)</text>
<rect x="120" y="810" width="380" height="1" fill="#F3F4F6"/>
<text x="120" y="824" class="field">remediation_pattern</text><text x="440" y="824" text-anchor="end" class="type">text (from SCAN_RULE)</text>

<!-- Flow: SCAN_RULE → evaluates → FINDING -->
<path d="M 310 620 L 310 700" stroke="#10B981" stroke-width="2" marker-end="url(#arrow)"/>
<text x="320" y="665" class="rel-label">evaluates</text>

<!-- ==================== SCORING ENGINE (process box) ==================== -->
<rect x="622" y="702" width="420" height="260" rx="8" fill="#D1D5DB" opacity="0.4"/>
<rect x="620" y="700" width="420" height="260" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
<rect x="620" y="700" width="420" height="36" rx="8" fill="#F59E0B"/>
<rect x="620" y="720" width="420" height="16" fill="#F59E0B"/>
<text x="830" y="724" text-anchor="middle" class="entity-name">SCORING ENGINE</text>

<text x="640" y="760" class="section-label">FORMULAS</text>
<rect x="640" y="770" width="380" height="1" fill="#F3F4F6"/>

<text x="640" y="790" class="field">Composite Score</text>
<text x="660" y="810" class="type">= severity x 0.4 + effort_inverse x 0.3 + risk x 0.3</text>

<rect x="640" y="822" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="840" class="field">Health Score</text>
<text x="660" y="860" class="type">= 100 - weighted_penalty (per assessment)</text>

<rect x="640" y="872" width="380" height="1" fill="#F3F4F6"/>
<text x="640" y="890" class="field">Domain Score</text>
<text x="660" y="910" class="type">= per-module health computation (ITSM, CMDB, etc.)</text>

<!-- Process indicator -->
<rect x="930" y="930" width="80" height="22" rx="11" fill="#F59E0B" opacity="0.15"/>
<text x="970" y="945" text-anchor="middle" class="status-text" fill="#F59E0B">PROCESS</text>

<!-- Flow: FINDING → scored by → SCORING ENGINE -->
<line x1="520" y1="790" x2="620" y2="790" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow)"/>
<text x="570" y="782" text-anchor="middle" class="rel-label">scored by</text>

<!-- ==================== FLOW DIAGRAM ==================== -->
<rect x="1142" y="122" width="1140" height="840" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
<text x="1712" y="160" text-anchor="middle" class="process-title">Scanning &amp; Scoring Pipeline</text>

<!-- Step 1: Load Rules -->
<rect x="1180" y="200" width="180" height="50" rx="8" fill="#10B981"/>
<text x="1270" y="230" text-anchor="middle" class="step-text">Load Scan Rules</text>
<text x="1270" y="270" text-anchor="middle" class="step-desc">23 rules across 5 modules</text>

<!-- Arrow -->
<line x1="1360" y1="225" x2="1420" y2="225" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Step 2: Evaluate -->
<rect x="1420" y="200" width="180" height="50" rx="8" fill="#10B981"/>
<text x="1510" y="230" text-anchor="middle" class="step-text">Evaluate Rules</text>
<text x="1510" y="270" text-anchor="middle" class="step-desc">Against instance data</text>

<!-- Arrow -->
<line x1="1600" y1="225" x2="1660" y2="225" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Step 3: Generate Findings -->
<rect x="1660" y="200" width="200" height="50" rx="8" fill="#10B981"/>
<text x="1760" y="230" text-anchor="middle" class="step-text">Generate Findings</text>
<text x="1760" y="270" text-anchor="middle" class="step-desc">Map to remediation patterns</text>

<!-- Arrow -->
<line x1="1860" y1="225" x2="1920" y2="225" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Step 4: Map Remediation -->
<rect x="1920" y="200" width="200" height="50" rx="8" fill="#8B5CF6"/>
<text x="2020" y="230" text-anchor="middle" class="step-text">Map Remediation</text>
<text x="2020" y="270" text-anchor="middle" class="step-desc">12 patterns with effort data</text>

<!-- Arrow down -->
<line x1="2020" y1="250" x2="2020" y2="340" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Step 5: Compute Composite -->
<rect x="1660" y="340" width="200" height="50" rx="8" fill="#F59E0B"/>
<text x="1760" y="370" text-anchor="middle" class="step-text">Composite Scoring</text>
<text x="1760" y="410" text-anchor="middle" class="step-desc">sev x 0.4 + effort x 0.3 + risk x 0.3</text>

<!-- Arrow -->
<line x1="1860" y1="365" x2="1920" y2="365" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Step 6: Health Index -->
<rect x="1920" y="340" width="200" height="50" rx="8" fill="#F59E0B"/>
<text x="2020" y="370" text-anchor="middle" class="step-text">Health Index</text>
<text x="2020" y="410" text-anchor="middle" class="step-desc">100 - weighted_penalty</text>

<!-- Arrow down -->
<line x1="2020" y1="390" x2="2020" y2="480" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Step 7: Domain Scores -->
<rect x="1920" y="480" width="200" height="50" rx="8" fill="#F59E0B"/>
<text x="2020" y="510" text-anchor="middle" class="step-text">Domain Scores</text>
<text x="2020" y="550" text-anchor="middle" class="step-desc">Per-module health breakdown</text>

<!-- Arrow left -->
<line x1="1920" y1="505" x2="1860" y2="505" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Step 8: Revenue Calc -->
<rect x="1660" y="480" width="200" height="50" rx="8" fill="#F59E0B"/>
<text x="1760" y="510" text-anchor="middle" class="step-text">Revenue Calculator</text>
<text x="1760" y="550" text-anchor="middle" class="step-desc">Hours x rate card = revenue</text>

<!-- Arrow down -->
<line x1="1760" y1="530" x2="1760" y2="620" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Output -->
<rect x="1580" y="620" width="360" height="60" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
<text x="1760" y="648" text-anchor="middle" class="process-title">Assessment Complete</text>
<text x="1760" y="668" text-anchor="middle" class="step-desc">health_score, domain_scores, findings with composite_score</text>

<!-- Decision: Pathfinder? -->
<rect x="1180" y="340" width="200" height="50" rx="8" fill="#3B82F6"/>
<text x="1280" y="370" text-anchor="middle" class="step-text">Pathfinder Fusion?</text>
<text x="1280" y="410" text-anchor="middle" class="step-desc">If confidence data available</text>

<!-- Arrow from findings down to pathfinder decision -->
<path d="M 1760 250 L 1760 310 Q 1760 330 1380 365" stroke="#3B82F6" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>

<!-- Arrow from pathfinder to composite -->
<line x1="1380" y1="365" x2="1660" y2="365" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
<text x="1520" y="358" text-anchor="middle" class="rel-label">enriched findings</text>

<!-- Legend -->
<rect x="100" y="1050" width="940" height="60" rx="8" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1"/>
<text x="120" y="1075" class="section-label">LEGEND</text>
<rect x="200" y="1066" width="14" height="14" rx="3" fill="#10B981"/>
<text x="220" y="1078" class="rel-label">Scanning</text>
<rect x="290" y="1066" width="14" height="14" rx="3" fill="#8B5CF6"/>
<text x="310" y="1078" class="rel-label">Remediation</text>
<rect x="400" y="1066" width="14" height="14" rx="3" fill="#F59E0B"/>
<text x="420" y="1078" class="rel-label">Scoring</text>
<rect x="490" y="1066" width="14" height="14" rx="3" fill="#3B82F6"/>
<text x="510" y="1078" class="rel-label">Pathfinder</text>
<text x="120" y="1098" class="note-text">Scoring weights: severity (0.4) + effort_inverse (0.3) + risk (0.3). Health = 100 - weighted_penalty across all findings.</text>
</svg>