<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1600" width="2400" height="1600" font-family="Inter, -apple-system, sans-serif">
<defs>
<style>
 .title { font-size: 24px; font-weight: 700; fill: #1A1A2E; }
 .subtitle { font-size: 14px; font-weight: 400; fill: #6B7280; }
 .entity-name { font-size: 14px; font-weight: 700; fill: #FFFFFF; }
 .pk { font-size: 11px; font-weight: 600; fill: #374151; }
