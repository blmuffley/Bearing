 .process-title { font-size: 16px; font-weight: 700; fill: #1F2937; }
 .step-text { font-size: 12px; font-weight: 500; fill: #FFFFFF; }
 .step-desc { font-size: 10px; font-weight: 400; fill: #6B7280; }
 .decision-text { font-size: 11px; font-weight: 600; fill: #FFFFFF; }
 .swim-label { font-size: 12px; font-weight: 700; fill: #374151; }
 .status-text { font-size: 10px; font-weight: 600; }
 .note-text { font-size: 10px; font-weight: 400; fill: #6B7280; font-style: italic; }
</style>
<marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 3.5 L0 7 Z" fill="#9CA3AF"/></marker>
<marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 3.5 L0 7 Z" fill="#3B82F6"/></marker>
<marker id="diamond" viewBox="0 0 12 8" refX="6" refY="4" markerWidth="12" markerHeight="8" orient="auto"><path d="M0 4 L6 0 L12 4 L6 8 Z" fill="#9CA3AF"/></marker>
<marker id="diamond-filled" viewBox="0 0 12 8" refX="6" refY="4" markerWidth="12" markerHeight="8" orient="auto"><path d="M0 4 L6 0 L12 4 L6 8 Z" fill="#3B82F6"/></marker>
</defs>
