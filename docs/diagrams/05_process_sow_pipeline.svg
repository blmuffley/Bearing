<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 800" width="1800" height="800" font-family="Inter, -apple-system, sans-serif">
<defs>
<style>
 .title { font-size: 24px; font-weight: 700; fill: #1A1A2E; }
 .subtitle { font-size: 14px; font-weight: 400; fill: #6B7280; }
 .entity-name { font-size: 14px; font-weight: 700; fill: #FFFFFF; }
 .pk { font-size: 11px; font-weight: 600; fill: #374151; }
 .field { font-size: 11px; font-weight: 400; fill: #4B5563; }
 .fk { font-size: 11px; font-weight: 400; fill: #2563EB; }
 .type { font-size: 10px; font-weight: 400; fill: #9CA3AF; }
 .section-label { font-size: 10px; font-weight: 700; fill: #6B7280; letter-spacing: 0.05em; text-transform: uppercase; }
 .rel-label { font-size: 10px; font-weight: 500; fill: #6B7280; }
 .process-title { font-size: 16px; font-weight: 700; fill: #1F2937; }
 .step-text { font-size: 12px; font-weight: 500; fill: #FFFFFF; }
 .step-desc { font-size: 10px; font-weight: 400; fill: #6B7280; }
 .decision-text { font-size: 11px; font-weight: 600; fill: #FFFFFF; }
 .swim-label { font-size: 12px; font-weight: 700; fill: #374151; }
 .status-text { font-size: 10px; font-weight: 600; }
 .note-text { font-size: 10px; font-weight: 400; fill: #6B7280; font-style: italic; }
</style>
<marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 3.5 L0 7 Z" fill="#9CA3AF"/></marker>
<marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 3.5 L0 7 Z" fill="#3B82F6"/></marker>
<marker id="diamond" viewBox="0 0 12 8" refX="6" refY="4" markerWidth="12" markerHeight="8" orient="auto"><path d="M0 4 L6 0 L12 4 L6 8 Z" fill="#9CA3AF"/></marker>
<marker id="diamond-filled" viewBox="0 0 12 8" refX="6" refY="4" markerWidth="12" markerHeight="8" orient="auto"><path d="M0 4 L6 0 L12 4 L6 8 Z" fill="#3B82F6"/></marker>
</defs>
<rect width="1800" height="800" fill="#FAFBFC"/>

<!-- Title -->
<text x="900" y="40" text-anchor="middle" class="title">SOW Pipeline — Process Flow</text>
<text x="900" y="62" text-anchor="middle" class="subtitle">From assessment findings through SOW generation, tracking, and calibration</text>

<!-- ==================== SWIM LANE 1: CONSULTANT ==================== -->
<rect x="60" y="90" width="1680" height="170" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
<rect x="60" y="90" width="130" height="170" rx="8" fill="#8B5CF6" opacity="0.1"/>
<text x="125" y="180" text-anchor="middle" class="swim-label" transform="rotate(-90,125,180)">CONSULTANT</text>

<!-- Review Assessment -->
<rect x="220" y="130" width="160" height="50" rx="8" fill="#8B5CF6"/>
<text x="300" y="153" text-anchor="middle" class="step-text">Review</text>
<text x="300" y="168" text-anchor="middle" class="step-text" style="font-size:10px">Assessment</text>
<text x="300" y="200" text-anchor="middle" class="step-desc">Analyze health scores &amp; findings</text>

<line x1="380" y1="155" x2="430" y2="155" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Select Findings -->
<rect x="430" y="130" width="160" height="50" rx="8" fill="#8B5CF6"/>
<text x="510" y="153" text-anchor="middle" class="step-text">Select</text>
<text x="510" y="168" text-anchor="middle" class="step-text" style="font-size:10px">Findings</text>
<text x="510" y="200" text-anchor="middle" class="step-desc">Cherry-pick for SOW scope</text>

<line x1="590" y1="155" x2="640" y2="155" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Configure Rate Card -->
<rect x="640" y="130" width="160" height="50" rx="8" fill="#8B5CF6"/>
<text x="720" y="153" text-anchor="middle" class="step-text">Configure</text>
<text x="720" y="168" text-anchor="middle" class="step-text" style="font-size:10px">Rate Card</text>
<text x="720" y="200" text-anchor="middle" class="step-desc">Set hourly rates &amp; engagement type</text>

<line x1="800" y1="155" x2="850" y2="155" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Generate SOW Draft -->
<rect x="850" y="130" width="160" height="50" rx="8" fill="#8B5CF6"/>
<text x="930" y="153" text-anchor="middle" class="step-text">Generate</text>
<text x="930" y="168" text-anchor="middle" class="step-text" style="font-size:10px">SOW Draft</text>
<text x="930" y="200" text-anchor="middle" class="step-desc">Auto-generated from patterns</text>

<!-- ==================== SWIM LANE 2: CUSTOMER ==================== -->
<rect x="60" y="270" width="1680" height="170" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
<rect x="60" y="270" width="130" height="170" rx="8" fill="#F59E0B" opacity="0.1"/>
<text x="125" y="360" text-anchor="middle" class="swim-label" transform="rotate(-90,125,360)">CUSTOMER</text>

<!-- Arrow from consultant to customer -->
<line x1="930" y1="180" x2="930" y2="250" stroke="#9CA3AF" stroke-width="2"/>
<line x1="930" y1="250" x2="300" y2="250" stroke="#9CA3AF" stroke-width="2"/>
<line x1="300" y1="250" x2="300" y2="310" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Review SOW -->
<rect x="220" y="310" width="160" height="50" rx="8" fill="#F59E0B"/>
<text x="300" y="333" text-anchor="middle" class="step-text">Review</text>
<text x="300" y="348" text-anchor="middle" class="step-text" style="font-size:10px">SOW</text>
<text x="300" y="380" text-anchor="middle" class="step-desc">Customer reviews proposal</text>

<line x1="380" y1="335" x2="430" y2="335" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Negotiate -->
<rect x="430" y="310" width="160" height="50" rx="8" fill="#F59E0B"/>
<text x="510" y="338" text-anchor="middle" class="step-text">Negotiate</text>
<text x="510" y="380" text-anchor="middle" class="step-desc">Adjust scope &amp; pricing</text>

<line x1="590" y1="335" x2="650" y2="335" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Decision: Accept? -->
<polygon points="740,305 830,335 740,365 650,335" fill="#F59E0B"/>
<text x="740" y="333" text-anchor="middle" class="decision-text" style="font-size:9px">Accept?</text>

<!-- Yes path -->
<line x1="830" y1="335" x2="880" y2="335" stroke="#10B981" stroke-width="2" marker-end="url(#arrow)"/>
<text x="855" y="327" text-anchor="middle" class="status-text" fill="#10B981">Yes</text>

<!-- Sign SOW -->
<rect x="880" y="310" width="160" height="50" rx="8" fill="#10B981"/>
<text x="960" y="338" text-anchor="middle" class="step-text">Sign SOW</text>
<text x="960" y="380" text-anchor="middle" class="step-desc">SOW accepted</text>

<!-- No path -->
<path d="M 740 365 L 740 400 Q 740 410 510 410 Q 510 400 510 360" stroke="#EF4444" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<text x="625" y="418" text-anchor="middle" class="status-text" fill="#EF4444">No: Request Changes</text>

<!-- ==================== SWIM LANE 3: SYSTEM ==================== -->
<rect x="60" y="450" width="1680" height="170" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
<rect x="60" y="450" width="130" height="170" rx="8" fill="#10B981" opacity="0.1"/>
<text x="125" y="540" text-anchor="middle" class="swim-label" transform="rotate(-90,125,540)">SYSTEM</text>

<!-- Arrow from customer to system -->
<line x1="960" y1="360" x2="960" y2="430" stroke="#9CA3AF" stroke-width="2"/>
<line x1="960" y1="430" x2="300" y2="430" stroke="#9CA3AF" stroke-width="2"/>
<line x1="300" y1="430" x2="300" y2="490" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Track Status -->
<rect x="220" y="490" width="160" height="50" rx="8" fill="#6366F1"/>
<text x="300" y="513" text-anchor="middle" class="step-text">Track</text>
<text x="300" y="528" text-anchor="middle" class="step-text" style="font-size:10px">Status</text>
<text x="300" y="560" text-anchor="middle" class="step-desc">Status transitions logged</text>

<line x1="380" y1="515" x2="430" y2="515" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Sync to Compass -->
<rect x="430" y="490" width="160" height="50" rx="8" fill="#EC4899"/>
<text x="510" y="513" text-anchor="middle" class="step-text">Sync to</text>
<text x="510" y="528" text-anchor="middle" class="step-text" style="font-size:10px">Compass</text>
<text x="510" y="560" text-anchor="middle" class="step-desc">Pipeline sync via API</text>

<line x1="590" y1="515" x2="640" y2="515" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Record Actual Hours -->
<rect x="640" y="490" width="160" height="50" rx="8" fill="#EF4444"/>
<text x="720" y="513" text-anchor="middle" class="step-text">Record</text>
<text x="720" y="528" text-anchor="middle" class="step-text" style="font-size:10px">Actual Hours</text>
<text x="720" y="560" text-anchor="middle" class="step-desc">Post-delivery actuals</text>

<line x1="800" y1="515" x2="850" y2="515" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Update Calibration -->
<rect x="850" y="490" width="160" height="50" rx="8" fill="#EF4444"/>
<text x="930" y="513" text-anchor="middle" class="step-text">Update</text>
<text x="930" y="528" text-anchor="middle" class="step-text" style="font-size:10px">Calibration</text>
<text x="930" y="560" text-anchor="middle" class="step-desc">Adjust estimates for future</text>

<!-- Calibration loop arrow -->
<path d="M 930 540 L 930 580 Q 930 595 1100 595 Q 1100 580 1100 540" stroke="#EF4444" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
<text x="1015" y="608" text-anchor="middle" class="note-text">Calibration loop feeds back to remediation patterns</text>

<!-- ==================== SOW STATUS PIPELINE ==================== -->
<rect x="60" y="660" width="1680" height="80" rx="8" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1"/>
<text x="90" y="690" class="section-label">SOW STATUS PIPELINE</text>

<!-- Draft -->
<rect x="280" y="678" width="80" height="30" rx="6" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="2"/>
<text x="320" y="698" text-anchor="middle" class="status-text" fill="#9CA3AF">Draft</text>

<line x1="360" y1="693" x2="410" y2="693" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Sent -->
<rect x="410" y="678" width="80" height="30" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
<text x="450" y="698" text-anchor="middle" class="status-text" fill="#3B82F6">Sent</text>

<line x1="490" y1="693" x2="540" y2="693" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Under Review -->
<rect x="540" y="678" width="110" height="30" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
<text x="595" y="698" text-anchor="middle" class="status-text" fill="#F59E0B">Under Review</text>

<line x1="650" y1="693" x2="700" y2="693" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Accepted -->
<rect x="700" y="668" width="90" height="30" rx="6" fill="#10B981" stroke="#10B981" stroke-width="2"/>
<text x="745" y="688" text-anchor="middle" class="status-text" fill="#FFFFFF">Accepted</text>

<!-- Declined -->
<rect x="700" y="706" width="90" height="30" rx="6" fill="#EF4444" stroke="#EF4444" stroke-width="2"/>
<text x="745" y="726" text-anchor="middle" class="status-text" fill="#FFFFFF">Declined</text>

<!-- Note -->
<text x="850" y="698" class="note-text">Accepted SOWs sync to Compass for project tracking. Declined SOWs can be revised and re-sent.</text>
</svg>