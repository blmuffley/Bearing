  <text x="1000" y="194" class="body" fill="#A8A29E" font-size="10">AI-driven classification</text>
  <text x="1000" y="210" class="body" fill="#A8A29E" font-size="10">Predictive analytics</text>
  <text x="1000" y="226" class="body" fill="#A8A29E" font-size="10">Self-healing data</text>
  <text x="1000" y="242" class="body" fill="#A8A29E" font-size="10">Full lifecycle automation</text>
