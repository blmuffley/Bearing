  <text x="100" y="560" class="body" fill="#A8A29E" font-size="10">No discovery tools</text>
  <text x="100" y="576" class="body" fill="#A8A29E" font-size="10">Stale/orphaned CIs</text>
  <text x="100" y="592" class="body" fill="#A8A29E" font-size="10">No CSDM alignment</text>
