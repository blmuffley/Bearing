  <text x="140" y="731" text-anchor="middle" class="label" fill="#39FF14" font-size="10">Bearing</text>
  <text x="200" y="731" class="body" fill="#A8A29E" font-size="9">Assess current state</text>

  <rect x="340" y="715" width="90" height="24" rx="12" fill="#39FF14" opacity="0.15" stroke="#39FF14" stroke-width="1"/>
  <text x="385" y="731" text-anchor="middle" class="label" fill="#39FF14" font-size="10">Pathfinder</text>
  <text x="448" y="731" class="body" fill="#A8A29E" font-size="9">Discover infrastructure</text>

  <rect x="610" y="715" width="80" height="24" rx="12" fill="#39FF14" opacity="0.15" stroke="#39FF14" stroke-width="1"/>
  <text x="650" y="731" text-anchor="middle" class="label" fill="#39FF14" font-size="10">Contour</text>
  <text x="708" y="731" class="body" fill="#A8A29E" font-size="9">Map services</text>

  <rect x="810" y="715" width="80" height="24" rx="12" fill="#39FF14" opacity="0.15" stroke="#39FF14" stroke-width="1"/>
  <text x="850" y="731" text-anchor="middle" class="label" fill="#39FF14" font-size="10">Vantage</text>
  <text x="908" y="731" class="body" fill="#A8A29E" font-size="9">Respond to incidents</text>

  <rect x="1040" y="715" width="80" height="24" rx="12" fill="#39FF14" opacity="0.15" stroke="#39FF14" stroke-width="1"/>
  <text x="1080" y="731" text-anchor="middle" class="label" fill="#39FF14" font-size="10">Compass</text>

  <!-- Footer -->
  <text x="30" y="785" class="body" fill="#A8A29E" font-size="9" opacity="0.6">AVENNORTH BEARING  |  CMDB Maturity Model  |  Confidential</text>
</svg>