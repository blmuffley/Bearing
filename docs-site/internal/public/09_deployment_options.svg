<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&amp;family=DM+Sans:wght@400;500;600&amp;family=Space+Mono&amp;display=swap');
      .heading { font-family: 'Syne', sans-serif; font-weight: 700; }
      .body { font-family: 'DM Sans', sans-serif; font-weight: 500; }
      .mono { font-family: 'Space Mono', monospace; }
      .label { font-family: 'DM Sans', sans-serif; font-weight: 600; }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowLime" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#39FF14"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A8A29E"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FAFAF9"/>
    </marker>
    <linearGradient id="limeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#39FF14;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#39FF14;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#1C1917"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="heading" fill="#FAFAF9" font-size="24">DEPLOYMENT ARCHITECTURE OPTIONS</text>
  <text x="600" y="63" text-anchor="middle" class="body" fill="#A8A29E" font-size="13">Three Deployment Models for Customer Environments</text>
  <line x1="400" y1="73" x2="800" y2="73" stroke="#39FF14" stroke-width="1" opacity="0.5"/>

  <!-- ================================================================ -->
  <!-- === OPTION A: HOSTED SAAS === -->
  <!-- ================================================================ -->
  <rect x="30" y="90" width="370" height="430" rx="14" fill="#292524" stroke="#39FF14" stroke-width="2"/>
  <rect x="30" y="90" width="370" height="36" rx="14" fill="#39FF14" opacity="0.1"/>
  <text x="215" y="114" text-anchor="middle" class="heading" fill="#39FF14" font-size="15" filter="url(#glow)">OPTION A: HOSTED SaaS</text>

  <!-- Avennorth Cloud boundary -->
  <rect x="50" y="140" width="330" height="160" rx="10" fill="url(#limeGrad)" stroke="#39FF14" stroke-width="1"/>
  <text x="70" y="160" class="label" fill="#39FF14" font-size="10">AVENNORTH CLOUD (Vercel + Supabase)</text>

  <rect x="65" y="175" width="140" height="45" rx="6" fill="#1C1917" stroke="#39FF14" stroke-width="0.8"/>
  <text x="135" y="195" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Bearing App</text>
  <text x="135" y="210" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">Next.js + tRPC</text>

  <rect x="225" y="175" width="140" height="45" rx="6" fill="#1C1917" stroke="#39FF14" stroke-width="0.8"/>
  <text x="295" y="195" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Supabase DB</text>
  <text x="295" y="210" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">PostgreSQL + RLS</text>

  <rect x="65" y="235" width="140" height="45" rx="6" fill="#1C1917" stroke="#39FF14" stroke-width="0.8"/>
  <text x="135" y="255" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Scan Engine</text>
  <text x="135" y="270" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">Assessment jobs</text>

  <rect x="225" y="235" width="140" height="45" rx="6" fill="#1C1917" stroke="#39FF14" stroke-width="0.8"/>
  <text x="295" y="255" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Report Gen</text>
  <text x="295" y="270" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">DOCX/PDF output</text>

  <!-- Network boundary line -->
  <line x1="50" y1="320" x2="380" y2="320" stroke="#A8A29E" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="215" y="338" text-anchor="middle" class="mono" fill="#A8A29E" font-size="9">HTTPS / TLS 1.3</text>

  <!-- Auth flow -->
  <rect x="130" y="348" width="140" height="35" rx="6" fill="#1C1917" stroke="#39FF14" stroke-width="0.8"/>
  <text x="200" y="370" text-anchor="middle" class="body" fill="#39FF14" font-size="10">OAuth 2.0 / Basic</text>

  <!-- Customer SN -->
  <rect x="70" y="400" width="260" height="55" rx="10" fill="none" stroke="#A8A29E" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="200" y="425" text-anchor="middle" class="label" fill="#FAFAF9" font-size="11">Customer ServiceNow</text>
  <text x="200" y="442" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">REST API / Table API</text>

  <line x1="200" y1="385" x2="200" y2="398" stroke="#39FF14" stroke-width="1.5" marker-end="url(#arrowLime)"/>
  <line x1="200" y1="300" x2="200" y2="346" stroke="#39FF14" stroke-width="1.5" marker-end="url(#arrowLime)"/>

  <!-- Data residency note -->
  <rect x="50" y="468" width="330" height="38" rx="6" fill="#1C1917" stroke="#A8A29E" stroke-width="0.5"/>
  <text x="65" y="485" class="body" fill="#A8A29E" font-size="9">Data residency: Avennorth cloud</text>
  <text x="65" y="500" class="body" fill="#39FF14" font-size="9">Best for: Quick deployment, low friction</text>

  <!-- ================================================================ -->
  <!-- === OPTION B: CUSTOMER-HOSTED === -->
  <!-- ================================================================ -->
  <rect x="415" y="90" width="370" height="430" rx="14" fill="#292524" stroke="#3B82F6" stroke-width="2"/>
  <rect x="415" y="90" width="370" height="36" rx="14" fill="#3B82F6" opacity="0.1"/>
  <text x="600" y="114" text-anchor="middle" class="heading" fill="#3B82F6" font-size="15">OPTION B: CUSTOMER-HOSTED</text>

  <!-- Customer Network boundary -->
  <rect x="435" y="140" width="330" height="330" rx="10" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1"/>
  <text x="455" y="160" class="label" fill="#3B82F6" font-size="10">CUSTOMER NETWORK</text>

  <rect x="450" y="175" width="140" height="45" rx="6" fill="#1C1917" stroke="#3B82F6" stroke-width="0.8"/>
  <text x="520" y="195" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Bearing Docker</text>
  <text x="520" y="210" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">Container image</text>

  <rect x="610" y="175" width="140" height="45" rx="6" fill="#1C1917" stroke="#3B82F6" stroke-width="0.8"/>
  <text x="680" y="195" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Local Database</text>
  <text x="680" y="210" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">PostgreSQL</text>

  <rect x="450" y="240" width="140" height="45" rx="6" fill="#1C1917" stroke="#3B82F6" stroke-width="0.8"/>
  <text x="520" y="260" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Scan Engine</text>
  <text x="520" y="275" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">Local execution</text>

  <rect x="610" y="240" width="140" height="45" rx="6" fill="#1C1917" stroke="#3B82F6" stroke-width="0.8"/>
  <text x="680" y="260" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Report Gen</text>
  <text x="680" y="275" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">Local output</text>

  <!-- Internal SN connection -->
  <rect x="515" y="310" width="140" height="35" rx="6" fill="#1C1917" stroke="#3B82F6" stroke-width="0.8"/>
  <text x="585" y="332" text-anchor="middle" class="body" fill="#3B82F6" font-size="10">Internal Network</text>

  <line x1="585" y1="347" x2="585" y2="368" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Customer SN inside their network -->
  <rect x="455" y="370" width="260" height="55" rx="10" fill="none" stroke="#A8A29E" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="585" y="395" text-anchor="middle" class="label" fill="#FAFAF9" font-size="11">Customer ServiceNow</text>
  <text x="585" y="412" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">REST API (internal)</text>

  <!-- No external connection -->
  <rect x="450" y="440" width="130" height="24" rx="4" fill="#1C1917" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="515" y="456" text-anchor="middle" class="mono" fill="#3B82F6" font-size="8">No egress required</text>

  <!-- Data residency note -->
  <rect x="435" y="468" width="330" height="38" rx="6" fill="#1C1917" stroke="#A8A29E" stroke-width="0.5"/>
  <text x="450" y="485" class="body" fill="#A8A29E" font-size="9">Data residency: Customer premises</text>
  <text x="450" y="500" class="body" fill="#3B82F6" font-size="9">Best for: Regulated industries, air-gapped</text>

  <!-- ================================================================ -->
  <!-- === OPTION C: HYBRID === -->
  <!-- ================================================================ -->
  <rect x="800" y="90" width="370" height="430" rx="14" fill="#292524" stroke="#F59E0B" stroke-width="2"/>
  <rect x="800" y="90" width="370" height="36" rx="14" fill="#F59E0B" opacity="0.1"/>
  <text x="985" y="114" text-anchor="middle" class="heading" fill="#F59E0B" font-size="15">OPTION C: HYBRID</text>

  <!-- Avennorth side -->
  <rect x="820" y="140" width="330" height="115" rx="10" fill="url(#limeGrad)" stroke="#39FF14" stroke-width="1"/>
  <text x="840" y="160" class="label" fill="#39FF14" font-size="10">AVENNORTH CLOUD</text>

  <rect x="835" y="175" width="140" height="45" rx="6" fill="#1C1917" stroke="#39FF14" stroke-width="0.8"/>
  <text x="905" y="195" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Bearing API</text>
  <text x="905" y="210" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">Orchestration layer</text>

  <rect x="995" y="175" width="140" height="45" rx="6" fill="#1C1917" stroke="#39FF14" stroke-width="0.8"/>
  <text x="1065" y="195" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Reports + DB</text>
  <text x="1065" y="210" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">Hosted storage</text>

  <!-- Network boundary -->
  <line x1="820" y1="275" x2="1150" y2="275" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="985" y="292" text-anchor="middle" class="mono" fill="#F59E0B" font-size="9">HTTPS / OAuth 2.0 / mTLS</text>

  <!-- Customer side -->
  <rect x="820" y="305" width="330" height="165" rx="10" fill="url(#orangeGrad)" stroke="#F59E0B" stroke-width="1"/>
  <text x="840" y="325" class="label" fill="#F59E0B" font-size="10">CUSTOMER NETWORK</text>

  <rect x="835" y="340" width="140" height="45" rx="6" fill="#1C1917" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="905" y="360" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Scan Agent</text>
  <text x="905" y="375" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">Lightweight collector</text>

  <rect x="835" y="400" width="300" height="55" rx="10" fill="none" stroke="#A8A29E" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="985" y="425" text-anchor="middle" class="label" fill="#FAFAF9" font-size="11">Customer ServiceNow</text>
  <text x="985" y="442" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">REST API (local scan)</text>

  <!-- Arrows for hybrid -->
  <line x1="905" y1="222" x2="905" y2="270" stroke="#F59E0B" stroke-width="1.5"/>
  <line x1="905" y1="298" x2="905" y2="338" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="905" y1="387" x2="905" y2="398" stroke="#F59E0B" stroke-width="1" marker-end="url(#arrowGray)"/>

  <!-- Bidirectional arrow label -->
  <rect x="995" y="340" width="140" height="45" rx="6" fill="#1C1917" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="1065" y="360" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Results Upload</text>
  <text x="1065" y="375" text-anchor="middle" class="mono" fill="#A8A29E" font-size="8">Encrypted payload</text>

  <line x1="1065" y1="338" x2="1065" y2="298" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Data residency note -->
  <rect x="820" y="468" width="330" height="38" rx="6" fill="#1C1917" stroke="#A8A29E" stroke-width="0.5"/>
  <text x="835" y="485" class="body" fill="#A8A29E" font-size="9">Data residency: Split (scans local, reports cloud)</text>
  <text x="835" y="500" class="body" fill="#F59E0B" font-size="9">Best for: Enterprise, data sensitivity balance</text>

  <!-- ================================================================ -->
  <!-- === COMPARISON TABLE (Bottom) === -->
  <!-- ================================================================ -->
  <rect x="30" y="540" width="1140" height="220" rx="12" fill="#1C1917" stroke="#A8A29E" stroke-width="0.8"/>
  <text x="600" y="568" text-anchor="middle" class="heading" fill="#FAFAF9" font-size="16">COMPARISON MATRIX</text>
  <line x1="50" y1="578" x2="1150" y2="578" stroke="#A8A29E" stroke-width="0.5" opacity="0.3"/>

  <!-- Headers -->
  <text x="230" y="598" text-anchor="middle" class="label" fill="#A8A29E" font-size="10">CRITERIA</text>
  <text x="530" y="598" text-anchor="middle" class="label" fill="#39FF14" font-size="10">A: HOSTED SaaS</text>
  <text x="780" y="598" text-anchor="middle" class="label" fill="#3B82F6" font-size="10">B: CUSTOMER-HOSTED</text>
  <text x="1030" y="598" text-anchor="middle" class="label" fill="#F59E0B" font-size="10">C: HYBRID</text>
  <line x1="50" y1="606" x2="1150" y2="606" stroke="#A8A29E" stroke-width="0.3" opacity="0.3"/>

  <!-- Row 1: Setup Time -->
  <text x="230" y="625" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Setup Time</text>
  <text x="530" y="625" text-anchor="middle" class="mono" fill="#39FF14" font-size="10">Minutes</text>
  <text x="780" y="625" text-anchor="middle" class="mono" fill="#3B82F6" font-size="10">Hours</text>
  <text x="1030" y="625" text-anchor="middle" class="mono" fill="#F59E0B" font-size="10">30 min</text>

  <!-- Row 2: Data Location -->
  <text x="230" y="650" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Data Location</text>
  <text x="530" y="650" text-anchor="middle" class="mono" fill="#39FF14" font-size="10">Avennorth cloud</text>
  <text x="780" y="650" text-anchor="middle" class="mono" fill="#3B82F6" font-size="10">Customer premises</text>
  <text x="1030" y="650" text-anchor="middle" class="mono" fill="#F59E0B" font-size="10">Split</text>

  <!-- Row 3: Network -->
  <text x="230" y="675" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Network Req</text>
  <text x="530" y="675" text-anchor="middle" class="mono" fill="#39FF14" font-size="10">Internet to SN</text>
  <text x="780" y="675" text-anchor="middle" class="mono" fill="#3B82F6" font-size="10">None (air-gap OK)</text>
  <text x="1030" y="675" text-anchor="middle" class="mono" fill="#F59E0B" font-size="10">Outbound HTTPS</text>

  <!-- Row 4: Auth -->
  <text x="230" y="700" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Auth Model</text>
  <text x="530" y="700" text-anchor="middle" class="mono" fill="#39FF14" font-size="10">OAuth 2.0 / Basic</text>
  <text x="780" y="700" text-anchor="middle" class="mono" fill="#3B82F6" font-size="10">Service account</text>
  <text x="1030" y="700" text-anchor="middle" class="mono" fill="#F59E0B" font-size="10">mTLS + OAuth</text>

  <!-- Row 5: Updates -->
  <text x="230" y="725" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Updates</text>
  <text x="530" y="725" text-anchor="middle" class="mono" fill="#39FF14" font-size="10">Automatic</text>
  <text x="780" y="725" text-anchor="middle" class="mono" fill="#3B82F6" font-size="10">Manual image pull</text>
  <text x="1030" y="725" text-anchor="middle" class="mono" fill="#F59E0B" font-size="10">Agent auto-update</text>

  <!-- Row 6: Target -->
  <text x="230" y="748" text-anchor="middle" class="body" fill="#FAFAF9" font-size="10">Target Market</text>
  <text x="530" y="748" text-anchor="middle" class="mono" fill="#39FF14" font-size="10">SMB / Midmarket</text>
  <text x="780" y="748" text-anchor="middle" class="mono" fill="#3B82F6" font-size="10">Regulated / Gov</text>
  <text x="1030" y="748" text-anchor="middle" class="mono" fill="#F59E0B" font-size="10">Enterprise</text>

  <!-- Branding footer -->
  <text x="30" y="785" class="body" fill="#A8A29E" font-size="9" opacity="0.6">AVENNORTH BEARING  |  Deployment Architecture Options  |  Confidential</text>
</svg>